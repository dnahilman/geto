services:
  geto:
    image: ghcr.io/dnahilman/geto:latest
    ports:
      - '${PORT:-7020}:7020'
    environment:
      NODE_ENV: production
      # Required in production — compose refuses to start if unset.
      GETO_AUTH_PASSWORD: ${GETO_AUTH_PASSWORD:?set a strong login password}
      GETO_MASTER_KEY: ${GETO_MASTER_KEY:?set a stable master key (keep it secret and unchanged)}
      GETO_DATA_DIR: /data
    volumes:
      - geto-data:/data
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  geto-data:
